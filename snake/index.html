<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Snake 🐍</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Fira Code',monospace;
    background:radial-gradient(circle at 50% 30%,rgba(46,160,67,.15),transparent 60%),#0d1117;
    color:#e6edf3;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:20px;user-select:none;
  }
  h1{font-size:2.2rem;margin-bottom:6px;background:linear-gradient(90deg,#2ea043,#58a6ff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hud{display:flex;gap:24px;margin:14px 0;font-size:1rem;color:#8b949e}
  .hud b{color:#e6edf3}
  canvas{background:#161b22;border:2px solid #30363d;border-radius:12px;box-shadow:0 0 30px rgba(46,160,67,.15);touch-action:none}
  .status{margin:12px 0;min-height:26px;color:#ffa657;font-size:1rem}
  button{background:linear-gradient(135deg,#238636,#2ea043);color:#fff;border:none;padding:10px 22px;border-radius:8px;font-size:1rem;cursor:pointer;font-family:inherit;margin-top:6px}
  .hint{color:#6e7681;font-size:.85rem;margin-top:10px}
  a.back{color:#58a6ff;text-decoration:none;margin-top:18px;font-size:.9rem}
  a.back:hover{text-decoration:underline}
  .dpad{display:none;grid-template-columns:repeat(3,60px);grid-template-rows:repeat(3,60px);gap:4px;margin-top:14px}
  .dpad button{background:#21262d;font-size:1.4rem;padding:0;border-radius:10px;margin:0}
  @media (max-width:600px){.dpad{display:grid}}
</style>
</head>
<body>
  <h1>🐍 Snake</h1>
  <div class="hud">
    <span>Score: <b id="score">0</b></span>
    <span>Best: <b id="best">0</b></span>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="status" id="status">Press any arrow key or tap to start</div>
  <button onclick="reset()">🔄 Restart</button>
  <div class="hint">↑ ↓ ← → to move · Space to pause</div>
  <div class="dpad">
    <div></div><button data-d="U">▲</button><div></div>
    <button data-d="L">◀</button><div></div><button data-d="R">▶</button>
    <div></div><button data-d="D">▼</button><div></div>
  </div>
  <a class="back" href="../">← Back to Arcade</a>

<script>
const cv=document.getElementById('game'),ctx=cv.getContext('2d');
const N=20,CELL=cv.width/N;
let snake,dir,nextDir,food,score,best=+localStorage.snakeBest||0,running,timer,paused;
document.getElementById('best').textContent=best;

function reset(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  spawnFood();score=0;paused=false;running=false;
  document.getElementById('score').textContent=0;
  document.getElementById('status').textContent='Press any arrow key or tap to start';
  clearInterval(timer);draw();
}
function spawnFood(){
  do{food={x:Math.floor(Math.random()*N),y:Math.floor(Math.random()*N)};}
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
}
function step(){
  if(paused)return;
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=N||head.y<0||head.y>=N||snake.some(s=>s.x===head.x&&s.y===head.y)){
    running=false;clearInterval(timer);
    document.getElementById('status').textContent=`💀 Game over! Score: ${score}`;
    if(score>best){best=score;localStorage.snakeBest=best;document.getElementById('best').textContent=best;document.getElementById('status').textContent+=` — NEW BEST! 🎉`}
    return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score++;document.getElementById('score').textContent=score;
    spawnFood();
    if(timer){clearInterval(timer);timer=setInterval(step,Math.max(60,140-score*2))}
  } else snake.pop();
  draw();
}
function draw(){
  ctx.fillStyle='#161b22';ctx.fillRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#30363d';
  for(let i=0;i<=N;i++){ctx.fillRect(i*CELL,0,1,cv.height);ctx.fillRect(0,i*CELL,cv.width,1)}
  // food
  ctx.fillStyle='#f778ba';
  ctx.beginPath();ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-2,0,Math.PI*2);ctx.fill();
  // snake
  snake.forEach((s,i)=>{
    ctx.fillStyle=i===0?'#2ea043':`rgba(46,160,67,${1-i*0.02})`;
    ctx.fillRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2);
  });
}
function start(){
  if(running)return;
  running=true;
  document.getElementById('status').textContent='';
  timer=setInterval(step,140);
}
function setDir(d){
  const map={U:{x:0,y:-1},D:{x:0,y:1},L:{x:-1,y:0},R:{x:1,y:0}};
  const n=map[d];
  if(n.x===-dir.x&&n.y===-dir.y)return;
  nextDir=n;start();
}
window.addEventListener('keydown',e=>{
  const k={ArrowUp:'U',ArrowDown:'D',ArrowLeft:'L',ArrowRight:'R'}[e.key];
  if(k){e.preventDefault();setDir(k)}
  else if(e.key===' '){paused=!paused;document.getElementById('status').textContent=paused?'⏸ Paused':''}
});
document.querySelectorAll('.dpad button').forEach(b=>b.onclick=()=>setDir(b.dataset.d));
// swipe
let sx,sy;
cv.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
cv.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>Math.abs(dy))setDir(dx>0?'R':'L');else setDir(dy>0?'D':'U');
});
reset();
</script>
</body>
</html>
