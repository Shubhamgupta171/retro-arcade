<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Memory Match 🧠</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Fira Code',monospace;
    background:radial-gradient(circle at 50% 30%,rgba(124,58,237,.14),transparent 60%),#0d1117;
    color:#e6edf3;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:20px;user-select:none;
  }
  h1{font-size:2.2rem;margin-bottom:6px;background:linear-gradient(90deg,#7c3aed,#58a6ff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hud{display:flex;gap:14px;margin:12px 0}
  .pill{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:8px 14px;text-align:center;min-width:80px}
  .pill span{display:block;color:#8b949e;font-size:.72rem;letter-spacing:1px}
  .pill b{font-size:1.2rem}
  .board{
    display:grid;grid-template-columns:repeat(4,82px);grid-template-rows:repeat(4,82px);
    gap:10px;margin:16px 0;perspective:1000px;
  }
  .card{
    position:relative;cursor:pointer;transform-style:preserve-3d;
    transition:transform .5s;
  }
  .card.flipped,.card.matched{transform:rotateY(180deg)}
  .face{
    position:absolute;inset:0;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;backface-visibility:hidden;
  }
  .back{background:linear-gradient(135deg,#1f2937,#374151);border:2px solid #30363d;color:#58a6ff;font-size:1.6rem}
  .front{
    background:linear-gradient(135deg,#7c3aed,#a855f7);border:2px solid #a855f7;
    transform:rotateY(180deg);box-shadow:0 0 15px rgba(124,58,237,.5);
  }
  .card.matched .front{background:linear-gradient(135deg,#2ea043,#22c55e);border-color:#22c55e;box-shadow:0 0 18px rgba(46,160,67,.6)}
  .status{margin:12px 0;min-height:26px;color:#ffa657;font-size:1rem}
  button{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;padding:10px 22px;border-radius:8px;font-size:1rem;cursor:pointer;font-family:inherit}
  a.back-link{color:#58a6ff;text-decoration:none;margin-top:18px;font-size:.9rem}
  a.back-link:hover{text-decoration:underline}
</style>
</head>
<body>
  <h1>🧠 Memory Match</h1>
  <div class="hud">
    <div class="pill"><span>MOVES</span><b id="moves">0</b></div>
    <div class="pill"><span>MATCHES</span><b id="matches">0/8</b></div>
    <div class="pill"><span>TIME</span><b id="time">0s</b></div>
  </div>
  <div class="board" id="board"></div>
  <div class="status" id="status">Flip cards to find matching pairs</div>
  <button onclick="reset()">🔄 New Game</button>
  <a class="back-link" href="../">← Back to Arcade</a>

<script>
const EMOJIS=['🚀','🎯','⚡','🎨','🔥','💎','🌈','🎮'];
let cards,flipped,matched,moves,startTime,timer;

function reset(){
  const deck=[...EMOJIS,...EMOJIS].sort(()=>Math.random()-0.5);
  cards=deck.map((e,i)=>({id:i,emoji:e,flipped:false,matched:false}));
  flipped=[];matched=0;moves=0;
  document.getElementById('moves').textContent=0;
  document.getElementById('matches').textContent='0/8';
  document.getElementById('status').textContent='Flip cards to find matching pairs';
  startTime=null;clearInterval(timer);document.getElementById('time').textContent='0s';
  render();
}
function render(){
  const b=document.getElementById('board');
  b.innerHTML='';
  cards.forEach(c=>{
    const el=document.createElement('div');
    el.className='card'+(c.flipped?' flipped':'')+(c.matched?' matched':'');
    el.innerHTML=`<div class="face back">?</div><div class="face front">${c.emoji}</div>`;
    el.onclick=()=>flip(c.id);
    b.appendChild(el);
  });
}
function flip(id){
  const c=cards[id];
  if(c.flipped||c.matched||flipped.length===2)return;
  if(!startTime){startTime=Date.now();timer=setInterval(()=>{document.getElementById('time').textContent=Math.floor((Date.now()-startTime)/1000)+'s'},200)}
  c.flipped=true;flipped.push(c);render();
  if(flipped.length===2){
    moves++;document.getElementById('moves').textContent=moves;
    const [a,b2]=flipped;
    if(a.emoji===b2.emoji){
      setTimeout(()=>{a.matched=b2.matched=true;flipped=[];matched++;document.getElementById('matches').textContent=`${matched}/8`;render();win()},300);
    } else {
      setTimeout(()=>{a.flipped=b2.flipped=false;flipped=[];render()},800);
    }
  }
}
function win(){
  if(matched===8){
    clearInterval(timer);
    const t=Math.floor((Date.now()-startTime)/1000);
    document.getElementById('status').textContent=`🏆 Won in ${moves} moves & ${t}s!`;
  }
}
reset();
</script>
</body>
</html>
