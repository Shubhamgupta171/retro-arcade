<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2048 🔢</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Fira Code',monospace;
    background:radial-gradient(circle at 50% 30%,rgba(247,120,186,.12),transparent 60%),#0d1117;
    color:#e6edf3;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:20px;user-select:none;
  }
  h1{font-size:2.2rem;margin-bottom:6px;background:linear-gradient(90deg,#ffa657,#f778ba);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hud{display:flex;gap:20px;margin:12px 0}
  .pill{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:8px 16px;text-align:center;min-width:90px}
  .pill span{display:block;color:#8b949e;font-size:.75rem;letter-spacing:1px}
  .pill b{font-size:1.4rem;color:#e6edf3}
  .board{
    background:#161b22;border:2px solid #30363d;border-radius:14px;
    padding:10px;display:grid;grid-template-columns:repeat(4,80px);grid-template-rows:repeat(4,80px);
    gap:10px;position:relative;
  }
  .cell{
    background:#21262d;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-size:1.6rem;font-weight:700;transition:all .12s;
  }
  .t2{background:#3b2f4a;color:#e6edf3}
  .t4{background:#4a3a6b;color:#e6edf3}
  .t8{background:#58a6ff;color:#fff}
  .t16{background:#7c3aed;color:#fff}
  .t32{background:#a855f7;color:#fff}
  .t64{background:#ec4899;color:#fff}
  .t128{background:#f97316;color:#fff;font-size:1.4rem}
  .t256{background:#f59e0b;color:#fff;font-size:1.4rem}
  .t512{background:#eab308;color:#1f1f1f;font-size:1.4rem}
  .t1024{background:#22c55e;color:#fff;font-size:1.2rem}
  .t2048{background:#2ea043;color:#fff;font-size:1.2rem;box-shadow:0 0 20px #2ea043}
  .status{margin:14px 0;min-height:26px;color:#ffa657;font-size:1rem}
  button{background:linear-gradient(135deg,#d97757,#f97316);color:#fff;border:none;padding:10px 22px;border-radius:8px;font-size:1rem;cursor:pointer;font-family:inherit}
  .hint{color:#6e7681;font-size:.85rem;margin-top:10px}
  a.back{color:#58a6ff;text-decoration:none;margin-top:18px;font-size:.9rem}
  a.back:hover{text-decoration:underline}
</style>
</head>
<body>
  <h1>🔢 2048</h1>
  <div class="hud">
    <div class="pill"><span>SCORE</span><b id="score">0</b></div>
    <div class="pill"><span>BEST</span><b id="best">0</b></div>
  </div>
  <div class="board" id="board"></div>
  <div class="status" id="status">Use arrow keys or swipe to play</div>
  <button onclick="reset()">🔄 New Game</button>
  <div class="hint">Merge tiles to reach 2048</div>
  <a class="back" href="../">← Back to Arcade</a>

<script>
let grid,score,best=+localStorage.best2048||0,won;
document.getElementById('best').textContent=best;

function reset(){
  grid=Array.from({length:4},()=>Array(4).fill(0));
  score=0;won=false;
  addTile();addTile();render();
  document.getElementById('status').textContent='Use arrow keys or swipe to play';
}
function addTile(){
  const empty=[];
  grid.forEach((r,i)=>r.forEach((v,j)=>{if(!v)empty.push([i,j])}));
  if(!empty.length)return;
  const [i,j]=empty[Math.floor(Math.random()*empty.length)];
  grid[i][j]=Math.random()<0.9?2:4;
}
function render(){
  const b=document.getElementById('board');
  b.innerHTML='';
  grid.forEach(r=>r.forEach(v=>{
    const c=document.createElement('div');
    c.className='cell'+(v?' t'+v:'');
    c.textContent=v||'';
    b.appendChild(c);
  }));
  document.getElementById('score').textContent=score;
  if(score>best){best=score;localStorage.best2048=best;document.getElementById('best').textContent=best}
}
function slide(row){
  let r=row.filter(v=>v);
  for(let i=0;i<r.length-1;i++){
    if(r[i]===r[i+1]){r[i]*=2;score+=r[i];if(r[i]===2048&&!won){won=true;document.getElementById('status').textContent='🏆 You hit 2048! Keep going...';}r.splice(i+1,1)}
  }
  while(r.length<4)r.push(0);
  return r;
}
function move(dir){
  const before=JSON.stringify(grid);
  if(dir==='L')grid=grid.map(r=>slide(r));
  else if(dir==='R')grid=grid.map(r=>slide(r.reverse()).reverse());
  else if(dir==='U'){
    for(let j=0;j<4;j++){
      let col=slide([0,1,2,3].map(i=>grid[i][j]));
      col.forEach((v,i)=>grid[i][j]=v);
    }
  } else if(dir==='D'){
    for(let j=0;j<4;j++){
      let col=slide([3,2,1,0].map(i=>grid[i][j]));
      col.forEach((v,i)=>grid[3-i][j]=v);
    }
  }
  if(JSON.stringify(grid)!==before){addTile();render();checkOver()}
}
function checkOver(){
  for(let i=0;i<4;i++)for(let j=0;j<4;j++){
    if(!grid[i][j])return;
    if(j<3&&grid[i][j]===grid[i][j+1])return;
    if(i<3&&grid[i][j]===grid[i+1][j])return;
  }
  document.getElementById('status').textContent=`💀 Game Over! Final score: ${score}`;
}
window.addEventListener('keydown',e=>{
  const k={ArrowLeft:'L',ArrowRight:'R',ArrowUp:'U',ArrowDown:'D'}[e.key];
  if(k){e.preventDefault();move(k)}
});
let sx,sy;
document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(Math.max(Math.abs(dx),Math.abs(dy))<30)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?'R':'L');else move(dy>0?'D':'U');
});
reset();
</script>
</body>
</html>
